server:
  port: 8081

spring:
  application:
    name: ms-auth
  datasource:
    url: jdbc:mysql://localhost:3306/db_auth
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/